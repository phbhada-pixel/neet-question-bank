name: Generate NEET MCQs

on:
  workflow_dispatch: 
  schedule:
    - cron: '0 * * * *' # याचा अर्थ: दर तासाला आपोआप रन करा (Every Hour)

jobs:
# ... बाकीचा खालचा कोड तसाच ठेवा
  generate-questions:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install gspread google-auth requests

      - name: Run Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SHEET_ID: ${{ secrets.SHEET_ID }}
          GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}
        run: python generate_questions.py
